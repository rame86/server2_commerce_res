name: Reservation Service CI/CD

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest

      # GCP Server 2 (서비스 서버) 배포
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_SERVER_2 }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            # 작업 디렉터리 생성 및 이동 (동적 계정명 적용)
            mkdir -p /home/${{ secrets.GCP_USER }}/reservation
            cd /home/${{ secrets.GCP_USER }}/reservation
            
            # 1. 환경 변수 파일(.env) 동적 생성
            cat <<EOF > .env
            # PostgreSQL (1서버)
            DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@${{ secrets.GCP_SERVER_1 }}:5432/msa_res_db?schema=res"
            
            # RabbitMQ (1서버)
            RABBITMQ_URL="amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASSWORD }}@${{ secrets.GCP_SERVER_1 }}:${{ secrets.RABBITMQ_PORT }}"
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            RABBITMQ_HOST=${{ secrets.GCP_SERVER_1 }}
            
            # Redis (1서버)
            REDIS_HOST=${{ secrets.GCP_SERVER_1 }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            # REDIS_PASSWORD=필요시 추가
            
            # App Config
            PORT=8082
            TZ=Asia/Seoul
            
            # Kakao API (Secret 이름 매핑 확인 요망)
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_PAY_SECRET_KEY }}
            KAKAO_API_URL=https://dapi.kakao.com/v2/local/search/address.json
            EOF
            
            # 2. docker-compose.yml 생성
            cat <<EOF > docker-compose.yml
            services:
              reservation:
                image: ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest
                container_name: reservation-service
                restart: always
                ports:
                  - "8082:8082"
                env_file: .env
                networks:
                  - msa-network

            networks:
              msa-network:
                external: true
            EOF
            
            # 3. 컨테이너 실행 및 사용하지 않는 이미지 정리
            docker compose pull
            docker compose up -d
            docker image prune -f