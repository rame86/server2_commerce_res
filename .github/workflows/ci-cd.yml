name: Reservation Service CI/CD

on:
  push:
    branches: [ master ]


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest

      # GCP Server 2 배포 (시크릿 이름 GCP_KEY로 수정)
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: 34.50.60.193
          username: oksm1003
          key: ${{ secrets.GCP_KEY }}
          # Deploy to GCP Server 2 단계의 script 부분 수정
          script: |
            mkdir -p /home/oksm1003/reservation
            cd /home/oksm1003/reservation
            
            # 1. 환경 변수 파일 생성 (Secrets 이름을 실제 등록한 이름과 맞춰줘)
            # DATABASE_URL 구성 시 POSTGRES_USER, POSTGRES_PASSWORD 사용
            echo "DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@34.158.208.117:5432/msa_res_db" > .env
            
            # RabbitMQ 정보 (별도 Secret이 없다면 일단 직접 입력하거나 Secret 추가 후 수정)
            echo "RABBITMQ_URL=amqp://msa_mq:mq1234@34.158.208.117:5672" >> .env
            echo "PORT=8082" >> .env
            
            # 2. docker-compose.yml 생성 (기존과 동일)
            cat <<EOF > docker-compose.yml
            services:
              reservation:
                image: ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest
                container_name: reservation-service
                restart: always
                ports:
                  - "8082:8082"
                env_file: .env
                networks:
                  - msa-network

            networks:
              msa-network:
                external: true
            EOF
            
            # 3. 실행
            docker compose pull
            docker compose up -d
            docker image prune -f